name: Build
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
# CI only. Publishing (Docker/ghcr, Homebrew, Helm chart, MCP deploy) lives
# upstream and is intentionally removed on this fork; releasing the Go binary
# is handled by release.yml on tags.
permissions:
  actions: read
  contents: read
  pull-requests: read
  security-events: write
jobs:
  commitlint:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # fetch-depth is required

      - uses: wagoid/commitlint-github-action@v6

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Required for pre-commit to be able scan history

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Go generate
        run: go generate ./...

      - uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Install script dependencies
        working-directory: ./scripts
        run: npm ci

      - uses: pre-commit/action@v3.0.1

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Go generate
        run: go generate ./...

      - name: Install dependencies
        run: go install ./...

      - name: go-test-race
        run: go test -race -v ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Go generate
        run: go generate ./...

      - name: Install dependencies
        run: go install ./...

      - name: go-vet
        run: go vet -v ./...

      - name: go-test
        run: go test -v ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9

      - name: Zigflow schema JSON
        run: go run . schema -o json

      - name: Zigflow schema YAML
        run: go run . schema -o yaml

  # Validate the release config on every push/PR so a broken .goreleaser.yaml is
  # caught before tagging. Does not publish anything.
  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: check

  e2e:
    runs-on: ubuntu-latest
    env:
      ZIGGY_EXAMPLE_ENVVAR: some-example-envvar
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Install Buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Install protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Go generate
        run: go generate ./...

      - name: Run tests
        run: task e2e

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Temporal CLI
        uses: temporalio/setup-temporal@v0

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: helm lint
        run: helm lint charts/zigflow

      - name: Install helm-unittest
        run: helm plugin install --verify=false https://github.com/helm-unittest/helm-unittest

      - name: helm unittest
        run: helm unittest charts/zigflow

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: ./charts/zigflow
          format: sarif
          output: trivy-helm.sarif
          exit-code: "1"
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-helm.sarif

      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          chmod +x skaffold
          sudo mv skaffold /usr/local/bin/
          skaffold version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kind

      - name: Deploy Temporal
        run: kubectl apply -f ./dev/k8s

      - name: Build Zigflow image
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: zigflow:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load image into Kind
        run: kind load docker-image zigflow:latest

      - name: Deploy Zigflow
        env:
          WORKFLOW_FILE: /data/workflow.yaml
          WORKFLOW_ENABLED: "true"
        run: |
          echo '{"builds":[{"imageName":"zigflow","tag":"zigflow:latest"}]}' > /tmp/artifacts.json
          skaffold deploy --build-artifacts /tmp/artifacts.json

      - name: Wait for Zigflow deployment
        run: kubectl rollout status -n zigflow deployment/zigflow --timeout=30s

      - name: Run Helm smoke tests
        run: helm test -n zigflow zigflow

      - name: Port forward Temporal
        run: kubectl port-forward svc/temporal -n temporal 7233:7233 &

      - name: Run known workflow
        run: |
          temporal workflow start \
            --workflow-id example \
            --type hello-world \
            --task-queue zigflow

      - name: Get the workflow result
        run: |
          timeout 30s temporal workflow result -w example -o json | grep EVENT_TYPE_WORKFLOW_EXECUTION_COMPLETED || {
            echo "Workflow result timed out or failed"
            exit 1
          }

      - name: Dump logs on failure
        if: failure()
        run: |
          kubectl get pods -A
          kubectl logs -n zigflow deploy/zigflow --all-containers=true || true
