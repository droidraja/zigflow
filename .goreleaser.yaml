version: 2
before:
  hooks:
    - go mod tidy
    - go generate ./...
builds:
  - env:
      - CGO_ENABLED=0
    id: zigflow
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # The module path is NOT renamed on this fork, so the version/commit are
    # injected into the upstream package path. Do not switch this to the fork's
    # repository path or the ldflags stop matching and `zigflow version` reports
    # "development".
    ldflags:
      - -w -s -X github.com/zigflow/zigflow/cmd.Version={{ .Version }} -X github.com/zigflow/zigflow/cmd.GitCommit={{ .FullCommit }}
archives:
  - formats:
      - binary
    # this name template makes the OS and Arch compatible with the results of uname.
    id: binaries
    ids:
      - zigflow
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-next"
release:
  prerelease: auto
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
# modelines, feel free to remove those if you don't want/use them:
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
