document:
  dsl: 1.0.0
  taskQueue: dynamic-tests
  workflowType: dynamic-for
  version: 0.0.1
do:
  - iterate:
      for:
        each: item
        in: ${ $input.items }
        at: index
      do:
        - capture:
            output:
              as:
                item: ${ $data.item }
                index: ${ $data.index }
            set:
              item: ${ $data.item }
              index: ${ $data.index }
